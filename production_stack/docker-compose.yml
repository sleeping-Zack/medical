services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: medapp
      MYSQL_USER: medapp
      MYSQL_PASSWORD: medapp_pwd
      MYSQL_ROOT_PASSWORD: root_pwd
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: dev
      DEBUG: "true"
      MYSQL_DSN: mysql+pymysql://medapp:medapp_pwd@mysql:3306/medapp?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: PLEASE_CHANGE_ME_TO_A_LONG_RANDOM_STRING
      SMS_PROVIDER: mock
      SMS_CODE_SALT: PLEASE_CHANGE_ME_TOO

volumes:
  mysql_data:
  redis_data:
