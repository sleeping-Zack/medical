version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: medapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # FastAPI Backend (Uncomment when Dockerfile is ready)
  # api:
  #   build: ./backend
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - db
  #     - redis
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@db:5432/medapp
  #     - REDIS_URL=redis://redis:6379/0

  # Celery Worker
  # celery_worker:
  #   build: ./backend
  #   command: celery -A core.celery_app worker --loglevel=info
  #   depends_on:
  #     - db
  #     - redis

volumes:
  postgres_data:
  redis_data:
  minio_data:
